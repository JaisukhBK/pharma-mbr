version: '3.9'
services:
  server:
    build: ./server
    container_name: pharma-mbr-server
    ports: ["3002:3002"]
    env_file: ./server/.env
    environment: { NODE_ENV: development }
    volumes: ["./server:/app", "/app/node_modules"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s

  client:
    image: node:20-alpine
    container_name: pharma-mbr-client
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports: ["5174:5174"]
    environment: { VITE_API_URL: "http://localhost:3002" }
    volumes: ["./client:/app", "/app/node_modules"]
    depends_on: [server]
